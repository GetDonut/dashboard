<!doctype html>
<meta name="viewport" content="user-scalable=0" />
<style>
  html {
    width: 100%;
    height: 100%;
    margin: 0%;
  }
  body {
    margin: 0%;
    background-color: rgba(170, 170, 256);
    width: 100%;
    height: 100%;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background-image: url("hheelloo.jpg");
    background-size: 25%;
  }
  #f {
    z-index: 1;
    position: absolute;
    background-color: rgb(46, 6, 6);
    width: 50%;
    top: 25%;
    left: 19%;
    height: 40%;
    display: flex;
    justify-content: center;
    overflow-y: scroll;
    border: rgb(23, 2, 2) solid 20px;
  }
  #plate {
    z-index: 1;
    position: absolute;
    background-color: rgba(1, 1, 1);
    height: 900px;
    width: 275px;
  }
  #hhhh {
    width: 100%;
  }

  #hhh {
    /* mult donut*/
    position: absolute;
    z-index: 4;
    width: 60%;
    bottom: -5%;
    left: 0%;
  }
  #hh {
    /* single donut*/
    position: absolute;
    z-index: 3;
    width: 460px;
    top: -20%;
    right: -20%;
  }
  #h {
    /* sky */
    position: absolute;
    width: 100%;
    height: 200px;
    right: 0;
    top: 0%;

    z-index: 2;
  }
  #a {
    /*tv*/
    z-index: 1;
    position: absolute;
    width: 70%;
    top: 22%;
    left: 18%;
    display: flex;
    justify-content: center;
  }
  #ttt {
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 3;
    position: absolute;
    margin: 0%;
    top: 0%;
  }
  #tt {
    width: 700px;
    height: 600px;
  }
  #aa {
    /* kitti */
    position: absolute;
    width: 200px;
    left: 25%;
    top: 5%;
    z-index: 2;
  }
</style>
<html>
  <title>t0Mat0</title>

  <body>
    <img src="clouds.png" id="h" />
    <div id="ttt">
      <div id="tt">
        <img src="donut.png" id="hh" onclick="splat.play()" />
        <img src="donutta.png" id="hhh" onclick="splat.play()" />
        <div id="f">
          <div id="plate"><img src="sf2.png" id="hhhh" /></div>
        </div>

        <img src="tv2.png" id="a" />
      </div>
    </div>
  </body>
</html>
<script>
  const splat = new Audio("splat.mp3");
  const pan = document.getElementById("tt");
  const patt = document.getElementById("ttt");
  window.onload = (event) => {
    let xxc =
      window.innerHeight > window.innerWidth
        ? window.innerWidth
        : window.innerHeight;
    pan.style.scale = `${xxc / 750}`;
  };
  window.onresize = (event) => {
    let xxc =
      window.innerHeight > window.innerWidth
        ? window.innerWidth
        : window.innerHeight;
    pan.style.scale = `${xxc / 750}`;
  };
</script>
