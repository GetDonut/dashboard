<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>heheeheh</title>
    <style>
      @font-face {
        font-family: "Happy Time Three";
        src: url("font/happy_time/Happy_Time/HappyTimeThree.otf")
          format("truetype");
      }
      body {
        margin: 0%;
        background-color: rgb(185, 191, 197);
        display: flex;
        flex-direction: column;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      #window {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: relative;
      }
      #nav {
        background: linear-gradient(to top, #83e7ff 0%, #ffffff 100%);
        width: 100vw;
        height: 50px;
        border-bottom: solid black 2px;
        position: fixed;
        z-index: 999; /* Force it to the top */
        top: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-left: 10px;
      }
      #footer {
        background: linear-gradient(to bottom, #006ee9 0%, #ffffff 100%);
        width: 99vw;
        padding: 1vw;
        height: 50px;
        border-top: solid black 2px;
        position: fixed;
        z-index: 999;
        bottom: 0;
        display: flex;
        justify-content: space-between;
      }
      #main {
        transform-origin: 0 0;
        width: 100vw;
        height: 100vh;
        position: relative;
      }
      #mainB {
        background-color: aliceblue;
        position: absolute;
        width: 450px;
        height: 900px;
        top: 50px;
        left: 0;
        z-index: 1;
        box-shadow: 89px 10px 15px 30px rgba(0, 0, 0, 0.1);
      }
      .column {
        position: absolute;
        display: flex;
        flex-direction: column;
        top: 50px;
        z-index: 1;
      }
      #mainA {
        background-color: aliceblue;
        width: 450px;
        height: 500px;
      }
      #mainC {
        background-color: aliceblue;
        width: 500px;
        height: 500px;

        clip-path: path(
          "M 0 0 L 0 500 L 450 500 L 450 220 C 450 50 500 200 500 50 L 500 0"
        );
      }
      img {
        height: 30px;
        width: auto;
        margin-right: 10px;
        display: block;
      }
      h1 {
        font-family: "Happy Time Three", serif;
        font-style: italic;
        color: #006ee9;
        font-weight: 550;
      }
    </style>
  </head>
  <body>
    <div id="nav">
      <h1>Imyahardcore</h1>
      <div style="display: flex; flex-direction: row">
        <img src="assets/message.png" />
        <img src="assets/learnfy.png" />
        <img src="assets/notif.png" />
      </div>
    </div>

    <div id="footer">
      <img src="assets/account.png" />
      <img src="assets/home.png" />
      <img src="assets/plus.png" />
      <img src="assets/calender.png" />
      <img src="assets/tabs.png" />
    </div>

    <div id="window">
      <div id="main">
        <div id="mainB"></div>
        <div class="column">
          <div id="mainC"></div>
        </div>
      </div>
    </div>

    <script>
      const main = document.getElementById("main");

      function applyScale() {
        const scaleVal = window.innerWidth / 600;
        main.style.transform = `scaleX(${scaleVal})`;
      }
      applyScale();
      window.addEventListener("resize", applyScale);
    </script>
  </body>
</html>
