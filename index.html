<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>heheeheh</title>
    <style>
      * {
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        border-radius: 0;
      }
      @font-face {
        font-family: "Happy Time Three";
        src: url("font/happy_time/Happy_Time/HappyTimeThree.otf")
          format("opentype");
      }
      body {
        margin: 0%;
        background-color: aliceblue;
        display: flex;
        flex-direction: column;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      #window {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: relative;
      }
      #nav {
        background: linear-gradient(to top, #83e7ff 0%, #ffffff 100%);
        width: 100vw;
        height: 50px;
        border-bottom: solid black 2px;
        position: fixed;
        z-index: 999;
        top: -50px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-left: 10px;
        transition: ease 500ms;
      }
      #footer {
        background: linear-gradient(to bottom, #006ee9 0%, #ffffff 100%);
        width: 99vw;
        padding: 1vw;
        height: 5vh;
        border-top: solid black 2px;
        position: fixed;
        z-index: 999;
        bottom: -50px;
        display: flex;
        justify-content: space-between;
        transition: ease 500ms;
      }
      #main {
        transform-origin: 0 0;
        width: 100vw;
        height: 100vh;
        position: relative;
        z-index: 3;
      }
      #mainB {
        background-color: aliceblue;
        position: absolute;
        width: 450px;
        height: 900px;
        top: 50px;
        left: 0;
        z-index: 1;
        box-shadow: 89px 10px 15px 30px rgba(0, 0, 0, 0.1);
      }
      .column {
        position: absolute;
        display: flex;
        flex-direction: column;
        top: 50px;
        z-index: 1;
      }
      #mainA {
        position: absolute;
        width: 500px;
        height: 900px;
        top: 50px;
        left: 0;
        z-index: 2;
      }
      #mainC {
        background-color: aliceblue;
        width: 500px;
        height: 500px;
        clip-path: path(
          "M 0 0 L 0 500 L 450 500 L 450 300 C 450 200 450 200 480 200 C 500 200 500 200 500 0"
        );
      }
      img {
        height: 30px;
        width: auto;
        margin-right: 10px;
        display: block;
      }
      h1 {
        font-family: "Happy Time Three", serif;
        font-style: italic;
        color: #006ee9;
        font-weight: 550;
      }
      .rounded {
        border-radius: 50px;
        border-top: solid #006ee9;
        border-bottom: solid #006ee9;
        border-left: solid #006ee9;
        border-right: solid #006ee9;
        height: 40px;
        width: 75%;
        margin-top: 30px;
        margin-left: 10px;
        padding-left: 35px;
      }
      #search {
        position: absolute;
        top: 30px;
        left: 20px;
        color: #006ee9;
        padding: 10px;
        transform: rotateY(180deg);
        font-variation-settings:
          "FILL" 0,
          "wght" 100,
          "GRAD" 200,
          "opsz" 48;
      }
      #rec {
        background-color: aliceblue;
        height: 100vh;
        position: fixed;
        right: 0;
        top: 0;
        z-index: 1;
      }
      .file {
        width: 175px;
        height: 85px;
        padding: 10px;
        font-size: 10px;
        overflow: hidden;
        clip-path: path(
          "M 0 85 L 10 24 L 60.5 14.5 C 63 2.5 56.5 0 129 4.5 C 117.5 5 165 0 170 40 L 175 85"
        );
        display: flex;
        align-items: flex-end;
        justify-content: center;
      }
      #folderS {
        width: 400px;
        height: auto;
        display: flex;
        flex-direction: row;
        position: absolute;
        justify-content: space-evenly;
        top: 50px;
        right: 0%;
        gap: 20px;
      }
      h2 {
        font-family: "Happy Time Three", serif;
        font-style: italic;
        color: #292f36;
        font-weight: 550;
        font-size: 1.2rem;
        margin: 0;
        padding-bottom: 5px;
      }
      #result {
        background-color: aliceblue;
        border-top: black solid;
        border-bottom: rgb(180, 180, 180) solid;
        position: absolute;
        top: 80px;
        width: 420px;
        right: 0px;
        padding-top: 70px;
        padding-bottom: 200px;
        padding-left: 1000vw;
        padding-right: 20px;
        height: 60vh;
        display: flex;
        flex-wrap: wrap;
        flex-direction: row;
        gap: 2px;
        align-content: start;
        align-items: start;
        justify-content: end;
        overflow-y: scroll;
      }
      .r {
        background: linear-gradient(to bottom, #ffffff 0%, #83e7ff 100%);
        width: 120px;
        height: 120px;
        border: #006ee9 solid;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search"
    />
  </head>
  <body>
    <div id="nav">
      <h1>Imyahardcore</h1>
      <div style="display: flex; flex-direction: row">
        <img src="assets/message.png" />
        <img src="assets/learnfy.png" />
        <img src="assets/notif.png" />
      </div>
    </div>

    <div id="footer">
      <img src="assets/account.png" />
      <img src="assets/home.png" />
      <img src="assets/plus.png" />
      <img src="assets/calender.png" />
      <img src="assets/tabs.png" />
    </div>

    <div id="window">
      <div id="main">
        <div id="mainB"></div>
        <div class="column">
          <div id="mainC"></div>
        </div>
        <div id="mainA" onclick="sidebar(1, event)">
          <input class="rounded" type="text" />
          <div
            id="search"
            class="material-symbols-outlined"
            onclick="sidebar(0, event)"
          >
            search
          </div>
        </div>
      </div>

      <div id="rec">
        <div id="folderS">
          <div class="file" style="background-color: #d0ffa4">
            <h2>yaho</h2>
          </div>
          <div class="file" style="background-color: violet">
            <h2>hiio</h2>
          </div>
          <div class="file" style="background-color: #006ee9">
            <h2>heyo</h2>
          </div>
          <div class="file" style="background-color: #83e7ff">
            <h2>hello</h2>
          </div>

          <div id="result">
            <div class="r"></div>
            <div class="r"></div>
            <div class="r"></div>
            <div class="r"></div>
            <div class="r"></div>
            <div class="r"></div>
            <div class="r"></div>
            <div class="r"></div>
            <div class="r"></div>
            <div class="r"></div>
            <div style="width: 360px; height: 260px">
              <h1>theres nothing left</h1>
            </div>
            <h1 style="position: absolute; right: 40px; top: -30px; z-index: 3">
              Recomended
            </h1>
          </div>
        </div>
      </div>
    </div>

    <script>
      const main = document.getElementById("main");
      const nav = document.getElementById("nav");
      const footer = document.getElementById("footer");
      let sidebarTog = 0;
      let inner = 0;
      window.addEventListener("load", () => {
        setTimeout(() => {
          nav.style.top = "0px";
          footer.style.bottom = "0px";
        }, 100);
      });
      function applyScale() {
        if (window.innerWidth < window.innerHeight) {
          inner = window.innerWidth;
          sidebarTog = 1;
        } else {
          inner = window.innerHeight;
        }
        const scaleVal = inner / 700;
        main.style.transform = `scaleX(${scaleVal})`;
      }
      applyScale();
      main.style.transition = "ease 200ms";
      function sidebar(a, event) {
        if (event) {
          event.stopPropagation();
        }
        if (window.innerWidth / window.innerHeight >= 2) {
          return;
        }
        if (a && sidebarTog) {
          return;
        }
        if (sidebarTog) {
          main.style.left = `${(-450 * inner) / 700}px`;
          sidebarTog = 0;
        } else {
          main.style.left = "0px";
          sidebarTog = 1;
        }
        addEventListener("resize", () => {
          if (window.innerWidth / window.innerHeight >= 2) {
            if (!sidebarTog) {
              sidebarTog = 1;
              main.style.left = "0px";
            }
          }
        });
      }
    </script>
  </body>
</html>
