<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=0"
    />
    <title>t0Mat0</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <style>
      html {
        margin: 0%;
        transition: ease 500ms;
      }
      body {
        display: flex;
        height: 100vh;
        width: 100vw;
        flex-direction: column;
        background-image: url("hheelloo.webp");
        overflow: hidden;
        transition: ease 500ms;
        overflow-x: hidden;
        margin: 0%;
      }
      #arr {
        height: 300vh;
        background-color: rgba(150, 110, 186, 0.615);
        width: 100vw;
        z-index: 0;
        position: absolute;
        transition: ease 500ms;
        top: 0vh;
        margin: 0%;
      }
      #panel {
        position: fixed;
        bottom: 0%;
        background: linear-gradient(
          to bottom,
          rgb(149, 120, 255),
          rgb(108, 76, 224)
        );
        width: 100vw;
        height: 15vh;
        display: flex;
        opacity: 80%;
        flex-wrap: wrap;
        z-index: 99;
      }
      #f {
        z-index: 1;
        position: absolute;
        background-color: rgb(46, 6, 6);
        width: 50%;
        top: 25%;
        left: 19%;
        height: 40%;
        display: flex;
        justify-content: center;
        overflow-y: scroll;
        border: rgb(23, 2, 2) solid 20px;
      }
      #plate {
        z-index: 1;
        position: absolute;
        background-color: rgba(1, 1, 1);
        height: 900px;
        width: 275px;
      }
      #hhhh {
        width: 100%;
      }
      #hhh {
        position: absolute;
        z-index: 4;
        width: 60%;
        bottom: -5%;
        left: 0%;
      }
      #hh {
        position: absolute;
        z-index: 1;
        width: 460px;
        top: -20%;
        right: -20%;
      }
      #h {
        position: absolute;
        width: 100%;
        height: 150px;
        right: 0%;
        top: 0%;
        z-index: 2;
      }
      #r {
        position: fixed;
        width: 100%;
        height: 100%;
        right: 0%;
        top: 0%;
        background-color: blueviolet;
        z-index: 5;
      }
      #a {
        z-index: 1;
        position: absolute;
        width: 70%;
        top: 22%;
        left: 18%;
        display: flex;
        justify-content: center;
      }
      .ttt {
        width: 100vw;
        z-index: 3;
        margin: 0%;
        background-image: radial-gradient(
          circle at center,
          rgb(215, 29, 140) 0vh,
          rgba(195, 53, 178, 0) 50%
        );
        height: 100vh;
      }
      #tt {
        width: 700px;
        position: relative;
        height: 600px;
      }
      .tra {
        height: 50%;
        width: 60px;
        background-color: rgb(108, 76, 224);
        border-radius: 10%;

        top: 0%;
      }
      .hmm {
        position: relative;
        top: 5%;
        left: 10%;
        height: 80%;
        width: 80%;

        background-color: rgb(149, 120, 255);
        border-radius: 10%;
      }
      .tra:active {
        height: 45%;
        top: 5%;
        background-color: rgb(95, 67, 195);
        border-radius: 10%;
      }
      #sea {
        background-color: purple;
        background-image: url(sea.gif);

        width: 100%;
        height: 5%;
        position: absolute;
        top: 130vh;
        overflow: hidden;
        z-index: 2;
        transition: ease 9s;
      }
      #sand {
        background-color: palevioletred;
        position: absolute;
        width: 100%;
        height: 20%;
        z-index: 1;
        bottom: 100vh;
      }
      #chat {
        overflow: hidden;
        position: relative;
        width: 80%;
        height: 80%;
        top: 10vh;
        right: -10vw;
        transform: scale(0.75);
        z-index: 4;
        opacity: 80%;
      }
      #fly {
        width: 100%;
        position: relative;
        z-index: 3;
        bottom: 10%;
      }
    </style>
  </head>
  <body>
    <div id="r">loading...</div>
    <img src="clouds.png" id="h" alt="clouds" />
    <img src="disco.gif" id="disco" />
    <div id="arr">
      <div id="panel">
        <div id="ponel">
          <div class="tra">
            <div class="hmm" onclick="ar.style.top = '0vh'">T</div>
          </div>
          <div class="tra">
            <div class="hmm" onclick="ar.style.top = '-100vh'">S</div>
          </div>
          <div class="tra">
            <div class="hmm" onclick="ar.style.top = '-200vh'">A</div>
          </div>
        </div>
      </div>
      <div class="ttt">
        <div id="tt">
          <img src="donut.png" id="hh" onclick="splat.play()" alt="donut" />
          <img src="donutta.png" id="hhh" onclick="splat.play()" alt="donuts" />
          <div id="f">
            <div id="plate"><img src="ghostface.webp" id="hhhh" /></div>
          </div>
          <img src="tv2.png" id="a" alt="tv" />
        </div>
      </div>

      <div class="ttt">
        <div id="sea"></div>
        <div
          id="chat-container"
          style="
            position: relative;
            top: 10vh;
            left: 10vw;
            width: 80vw;
            z-index: 10;
          "
        >
          <div
            id="chat-display"
            style="
              height: 300px;
              background: rgba(0, 0, 0, 0.5);
              color: white;
              border: 2px solid #9578ff;
              overflow-y: auto;
              padding: 10px;
              margin-bottom: 10px;
              font-family: sans-serif;
            "
          >
            <p><i>System: Connecting to the void...</i></p>
          </div>

          <div style="display: flex; gap: 5px">
            <input
              type="text"
              id="chatInput"
              style="
                flex-grow: 1;
                padding: 10px;
                border: none;
                border-radius: 5px;
              "
            />
            <button
              onclick="sendMessage()"
              style="
                padding: 10px 20px;
                background: #6c4ce0;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
              "
            >
              Send
            </button>
          </div>
        </div>
        <script>
          let userName = "";

          const socket = new WebSocket(
            "wss://free.blr2.piesocket.com/v3/1?api_key=MjoCdbJ75TF9kkCMMpUUZumuDjUicq0p9p0v4AdX",
          );

          const display = document.getElementById("chat-display");
          const input = document.getElementById("chatInput");
          input.placeholder = "enter your username";
          socket.onmessage = function (event) {
            let hell = JSON.parse(event.data);
            const newMsg = document.createElement("p");
            newMsg.textContent = `${hell.userName}> ${hell.data}`;
            newMsg.style.margin = "5px 0";
            display.appendChild(newMsg);

            display.scrollTop = display.scrollHeight;
          };

          socket.onopen = () => {
            display.innerHTML += `<p style="color: #00ff00;">> Connected!</p>`;
          };

          socket.onerror = (err) => {
            display.innerHTML += `<p style="color: #ff0000;">> OPP youre offline silly</p>`;
          };

          // 3. Send message function
          function sendMessage() {
            if (userName) {
              if (input.value.trim() !== "") {
                socket.send(
                  JSON.stringify({ userName: userName, data: input.value }),
                );
                display.innerHTML += `<p style="color: #aaa;">You: ${input.value}</p>`;
                input.value = "";
              }
            } else {
              userName = input.value;
              input.value = "";
              input.placeholder = "type your message ....";
            }
          }

          // Allow pressing "Enter" to send
          input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
          });
        </script>
        <img src="flies.gif" id="fly" />
        <div id="sand"></div>
      </div>

      <div class="ttt"></div>
    </div>
    <script>
      const splat = new Audio("splat.mp3");
      const pan = document.getElementById("tt");
      const buff = document.getElementById("r");
      const ar = document.getElementById("arr");
      const tv = document.getElementById("hhhh");
      const sea = document.getElementById("sea");
      const tra = document.getElementsByClassName("tra");
      const content = ["ghostface.webp", "sf2.png"];
      const rand = (Max) => {
        return Math.round(Math.random() * (Max - 1));
      };
      const buffOn = (flag) => {
        if (flag) {
          buff.style.visibility = "visible"; // Fixed typo 'visable'
          buff.style.zIndex = "5";
        } else {
          buff.style.visibility = "hidden";
          buff.style.zIndex = "0";
        }
      };

      const work = () => {
        buffOn(1);
        let xxc =
          window.innerHeight > window.innerWidth
            ? window.innerWidth
            : window.innerHeight;
        pan.style.scale = `${xxc / 1000}`;
        for (let i = 0; i < tra.length; i++) {
          tra[i].style.position = "absolute";
          tra[i].style.left = `${25 + 25 * i}%`;
          tv.src = content[rand(2)];
        }
        buffOn(0);
      };

      window.onload = (event) => {
        work();
      };
      window.onresize = (event) => {
        work();
      };
      setInterval(() => {
        if (sea.style.height == "10%") {
          sea.style.height = "5%";
          sea.style.borderBottomLeftRadius = "0%";
          sea.style.borderBottomRightRadius = "0%";
        } else {
          sea.style.height = "10%";
          sea.style.borderBottomLeftRadius = "40%";
          sea.style.borderBottomRightRadius = "40%";
        }
      }, 5000);
    </script>
  </body>
</html>
