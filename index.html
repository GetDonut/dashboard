<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ui_demo</title>
    <style>
      * {
        color: #909a8d;
      }
      body {
        background: #9fa0a8; /* fallback for old browsers */
        background: -webkit-linear-gradient(
          to right,
          #5c7852,
          #9fa0a8
        ); /* Chrome 10-25, Safari 5.1-6 */
        background: linear-gradient(
          to right,
          #5c7852,
          #9fa0a8
        ); /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
      }
      body,
      html {
        margin: 0%;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      .signin {
        position: absolute;
        left: 15vw;
        top: 15vh;
        width: 70vw;
        height: 70vh;
        background-color: aliceblue;
        border-radius: 2%;
        user-select: none;
        transition: ease-in 5ms;
      }
      .termin {
        position: absolute;
        left: 0vw;
        top: 0vh;
        width: 100vw;
        height: 100vh;
        background-color: aliceblue;
        border-radius: 2%;
        user-select: none;
        transition: ease-in 70ms;
      }
      .active:active {
        left: 16.5vw;
        top: 16.5vh;
        width: 67vw;
        height: 67vh;
        background-color: rgb(189, 189, 189);
      }
      h1 {
        font-size: 50px;
        color: rgb(93, 126, 93);
        margin-left: 2%;
      }
      h2 {
        font-size: 20px;
        color: rgb(87, 98, 87);
        margin-left: 2%;
      }
      #shadow {
        background-color: black;
        opacity: 10%;
        width: 100vw;
        height: 100vh;
        position: absolute;
        margin: 0%;
        transition: ease-in 1000ms;
      }
      .horizcenter {
        display: flex;
        align-items: center;
        flex-direction: column;
        gap: 7%;
      }
      .togOn {
        transition: ease 200ms;
        width: 60vw;
        text-align: center;
      }
      .togOn:hover {
        background-color: #61db94;
        color: #27ae60;
      }
      input {
        border: 1px solid #ccc;
        border-radius: 5px;
        width: 80%;
        padding: 10px;
        transition: border-color 0.3s ease;
        outline: none;
      }

      input:focus {
        border-color: #27ae60;
      }
    </style>
  </head>

  <body>
    <div id="stat"></div>
    <div
      class="active signin"
      id="sigin"
      onclick="
        setTimeout(
          () =>
            promptIn(profile, [
              { n: 'what is your username', type: 'disp' },
              { n: 'name', type: 'textIn' },
              { n: 'and what are you?', type: 'disp' },
              { n: 'type', choice: ['student', 'teacher'], type: 'check' },
            ]),
          400,
        )
      "
    >
      <h1>Hello_World!</h1>
      <h2>to_ui_demo</h2>
      <h2>sign in to continue</h2>
    </div>
  </body>
  <script>
    class person {
      constructor(name, text) {
        this.name = name;
        this.text = text;
      }
    }
    const tch = [
      new person("A1_34", "hi i teach sci"),
      new person("A1_29", "hi i teach math"),
      new person("A1_23", "hi i teach eng"),
    ];
    const std = [];
    let shadow;
    const profile = { name: "guest...", type: null, cudir: null };
    const promptOut = () => {
      document.getElementById("prompt").remove();
      document.getElementById("shadow").remove();
    };
    const promptIn = (obj, inp) => {
      shadow = document.createElement("div");
      shadow.id = "shadow";
      shadow.addEventListener("click", () => {});
      document.querySelector("body").append(shadow);
      shadow.style.opacity = "80%";
      const prompt = document.createElement("div");
      prompt.classList.add("signin", "horizcenter");
      prompt.id = "prompt";
      for (let i = 0; i < inp.length; i++) {
        let child = document.createElement("div");
        switch (inp[i].type) {
          case "disp":
            child.textContent = inp[i].n;
            break;
          case "textIn":
            child = document.createElement("input");
            child.type = "text";
            child.placeholder = obj[inp[i].n] ? obj[inp[i].n] : inp[i].n;
            child.function = () => {
              obj[inp[i].n] = child.value;
            };
            break;
          case "check":
            child.tag;
            for (let j = 0; j < inp[i].choice.length; j++) {
              let choice = document.createElement("div");
              choice.classList.add("togOn");
              choice.textContent = inp[i].choice[j];
              choice.number = j;
              choice.addEventListener("click", () => {
                child.tag = choice.number;
                choice.style.transform = "scale(5)";
                choice.style.opacity = "20%";
                choice.style.backgroundColor = "#3d9361";
                for (let o = 0; o < [...prompt.children].length; o++) {
                  if ([...prompt.children][o].function) {
                    [...prompt.children][o].function();
                  }
                }

                prompt.classList.add("termin");
                prompt.style.opacity = "20%";
                setTimeout(() => {
                  promptOut();
                }, 200); // match your CSS transition (200ms)
              });

              child.append(choice);
            }
            child.function = () => {
              obj[inp[i].n] = [...child.children][child.tag].textContent;
            };
            break;
        }
        if (!i) child.style.marginTop = "10%";
        prompt.append(child);
      }
      prompt.style.opacity = "20%";
      document.querySelector("body").append(prompt);
      setTimeout(() => {
        prompt.style.opacity = "100%";
      }, 2);
    };
  </script>
</html>
